[tox]
env_list = cov, py311, py312, py313, py314
isolated_build = true
skip_missing_interpreters = true

[testenv]
deps =
    .[async]
    pico-ioc>=2.2.0
    sqlalchemy>=2.0
    pytest>=8
    pytest-asyncio
    aiosqlite
    alembic>=1.13
commands = pytest -s {posargs:tests}

[testenv:cov]
deps =
    .[async]
    pico-ioc>=2.2.0
    sqlalchemy>=2.0
    pytest>=8
    pytest-asyncio
    pytest-cov>=5
    aiosqlite
    alembic>=1.13
setenv =
    COVERAGE_FILE = {tox_root}/.coverage
commands =
    pytest --cov=pico_sqlalchemy --cov-report=term-missing {posargs:tests}
package = editable

