name: Publish Python Package to PyPI

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install build deps
      run: python -m pip install --upgrade pip build

    - name: Build package
      run: python -m build

    - name: Reject non-clean versions (.dev / .post)
      run: |
        python - <<'PY'
        import glob, sys
        whl = sorted(glob.glob('dist/*.whl'))[0]
        ver = whl.split('-')[1]
        print(f"Built version: {ver}")
        if 'dev' in ver or 'post' in ver:
            sys.exit(f"::error::Refusing to publish non-clean version '{ver}'. "
                     "Create the GitHub Release from an exact version tag (e.g. v0.4.0).")
        PY

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        skip-existing: true
        verify-metadata: true
        attestations: true

